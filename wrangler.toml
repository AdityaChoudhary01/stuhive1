# This is the configuration file for Cloudflare Wrangler.
# It tells Cloudflare how to build and deploy your Next.js application.

name = "stuhive-next" # Your Cloudflare Pages project name
compatibility_date = "2024-03-10" # Use a recent date

# 🛑 CRITICAL: This enables Node.js APIs for Mongoose and Ably.
compatibility_flags = [ "nodejs_compat" ]

[pages]
# The directory of static assets generated by OpenNext
build_output_dir = ".open-next/assets"

[vars]
# 🔒 IMPORTANT: You must replace these with your actual secrets from the Cloudflare Dashboard.
# Go to Your Project > Settings > Environment Variables > Add environment variable (for Production and Preview).
# Use "Secret text" for sensitive values.
MONGODB_URI = "YOUR_MONGODB_CONNECTION_STRING_HERE"
NEXTAUTH_SECRET = "YOUR_NEXTAUTH_SECRET_HERE"
NEXTAUTH_URL = "YOUR_PRODUCTION_URL_HERE"
NEXT_PUBLIC_R2_PUBLIC_URL = "YOUR_R2_PUBLIC_URL_HERE"
# ... add any other variables from your .env.local file here.

# 📦 This section binds your Cloudflare R2 bucket to the application,
# allowing your server-side code (like getAvatarUploadUrlAction) to access it.
[[r2_buckets]]
# This is the name your code will use to refer to the bucket.
binding = "R2_AVATARS"
# This is the actual name of your bucket in the Cloudflare R2 dashboard.
bucket_name = "YOUR_ACTUAL_R2_BUCKET_NAME_HERE"
